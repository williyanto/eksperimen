    <script>
        // Set theme immediately to prevent flashing
        (function() {
            const currentTheme = localStorage.getItem('theme_mypro') || 'dark';
            if (currentTheme === 'dark') {
                document.documentElement.classList.add('dark');
                document.documentElement.classList.add('dark-mode');
            }
        })();
    </script>

        :root {
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --font-title: 'Outfit', sans-serif;
            --font-mono: 'Fira Code', monospace;

            /* Light Mode */
            --bg-body: #f8fafc;
            --bg-card: rgba(255, 255, 255, 0.85);
            --border-color: rgba(226, 232, 240, 0.8);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary-accent: #4f46e5;
            --primary-gradient: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            --shadow-md: 0 10px 30px -10px rgba(0, 0, 0, 0.06);
            --input-bg: #ffffff;
            --input-border: #cbd5e1;
            --readonly-bg: #f8fafc;
        }

        .dark-mode {
            /* Dark Mode */
            --bg-body: #030712;
            --bg-card: rgba(17, 24, 39, 0.7);
            --border-color: rgba(31, 41, 55, 0.6);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --primary-accent: #6366f1;
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --shadow-md: 0 10px 30px -10px rgba(0, 0, 0, 0.3);
            --input-bg: rgba(31, 41, 55, 0.5);
            --input-border: rgba(55, 65, 81, 0.8);
            --readonly-bg: rgba(31, 41, 55, 0.2);
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-body);
            color: var(--text-main);
            transition: background-color 0.4s ease, color 0.4s ease;
            position: relative;
            min-height: 100vh;
        }

        /* Decorative Background Orbs */
        .orb {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.12;
            z-index: -1;
            pointer-events: none;
        }
        
        .orb-1 {
            background: var(--primary-accent);
            top: -50px;
            left: -50px;
        }
        
        .orb-2 {
            background: #7c3aed;
            bottom: -50px;
            right: -50px;
        }

        .glass-card {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-md);
            border-radius: 24px;
            transition: all 0.3s;
        }

        .input-premium {
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text-main);
            border-radius: 12px;
            padding: 10px 14px;
            width: 100%;
            outline: none;
            transition: all 0.3s;
            font-size: 14px;
        }

        .input-premium:focus {
            border-color: var(--primary-accent);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        .input-readonly {
            background: var(--readonly-bg);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            border-radius: 12px;
            padding: 10px 14px;
            width: 100%;
            outline: none;
            cursor: not-allowed;
            font-size: 14px;
        }

        .label-premium {
            font-family: var(--font-title);
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 6px;
            display: block;
            letter-spacing: 0.3px;
        }

        .toggle-theme-btn {
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 16px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: var(--border-color);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .toggle-theme-btn:hover {
            transform: rotate(30deg) scale(1.05);
            background: var(--text-muted);
            color: var(--bg-body);
        }

        .standard-tab {
            flex: 1;
            text-align: center;
            padding: 10px 16px;
            font-family: var(--font-title);
            font-size: 13px;
            font-weight: 700;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .standard-tab.active {
            background: var(--primary-gradient);
            color: #ffffff;
            border-color: transparent;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25);
        }
        
        .standard-tab:not(.active) {
            background: var(--readonly-bg);
            color: var(--text-muted);
        }
        
        .standard-tab:not(.active):hover {
            color: var(--text-main);
            border-color: var(--text-muted);
            transform: translateY(-1px);
        }

        .btn-action-primary {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 10px 20px;
            font-family: var(--font-title);
            font-weight: 700;
            font-size: 14px;
            border-radius: 12px;
            background: var(--primary-gradient);
            color: #ffffff;
            border: none;
            cursor: pointer;
            transition: all 0.25s;
        }

        .btn-action-primary:hover {
            transform: translateY(-1.5px);
            box-shadow: 0 8px 20px -6px rgba(99, 102, 241, 0.4);
        }

        .btn-action-secondary {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 16px;
            font-family: var(--font-title);
            font-weight: 600;
            font-size: 13px;
            border-radius: 12px;
            background: var(--readonly-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.25s;
        }

        .btn-action-secondary:hover {
            border-color: var(--text-muted);
            transform: translateY(-1px);
            background: var(--border-color);
        }

        .btn-action-danger {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 16px;
            font-family: var(--font-title);
            font-weight: 600;
            font-size: 13px;
            border-radius: 12px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #ef4444;
            cursor: pointer;
            transition: all 0.25s;
        }

        .btn-action-danger:hover {
            background: #ef4444;
            color: #ffffff;
            border-color: transparent;
            transform: translateY(-1.5px);
            box-shadow: 0 8px 20px -6px rgba(239, 68, 68, 0.4);
        }
    </style>
</head>

    <div class="orb orb-1"></div>

            <button class="toggle-theme-btn" id="theme-toggler" aria-label="Toggle Theme">

        <div class="space-y-4">
            
            <div class="flex gap-4">
                <div class="w-1/2">

                </div>

              <option value="2500">2500 mm²</option>

                </div>
                <div class="w-1/3">
                    <label for="spekMax" class="label-premium">Spek. Maks (Ω/km)</label>
                    <input type="text" name="spekMax" id="spekMax" readonly class="input-readonly" placeholder="-">
                </div>
            </div>

            <!-- Hasil Kalkulasi Card -->
            <div class="p-5 rounded-2xl border border-solid border-indigo-100 dark:border-indigo-900/50 bg-gradient-to-br from-indigo-50/80 to-blue-50/80 dark:from-indigo-950/30 dark:to-indigo-900/20 text-center space-y-2 mt-6 shadow-sm">

                    <span class="text-xs font-bold text-indigo-600 dark:text-indigo-400">Ω/km</span>
                </div>
                <p id="pesanHasil" class="text-xs font-medium text-center h-5 transition-all duration-300"></p>
            </div>

            <!-- Standard Selector Tabs -->
            <div class="pt-4 grid grid-cols-2 sm:grid-cols-4 gap-2">

            </div>

        <footer class="text-center text-gray-400 dark:text-gray-600 text-xs mt-8 pt-4 border-t border-gray-200 dark:border-gray-800">

        const pesanHasil = document.getElementById('pesanHasil');

        function validateNumericInput(event) {
            event.target.value = event.target.value.replace(/[^0-9.]/g, '');
        }

        function hitungHasil() {
            hasilKalkulasiInput.classList.remove('text-green-500', 'text-red-500');
            pesanHasil.className = 'text-center text-sm h-5';
            pesanHasil.innerText = '';
            const pembacaan = parseFloat(pembacaanAlatInput.value);
            const panjang = parseFloat(panjangInput.value);
            const koreksi = parseFloat(faktorKoreksiInput.value);
            if (!isNaN(pembacaan) && !isNaN(panjang) && !isNaN(koreksi) && panjang !== 0) {
                const hasil = (pembacaan / panjang) * koreksi;
                hasilKalkulasiInput.value = hasil.toFixed(4);
                const spekMaxString = spekMaxInput.value.replace(',', '.');
                const spekMax = parseFloat(spekMaxString);
                if (!isNaN(spekMax)) {
                    if (hasil < spekMax) {
                        hasilKalkulasiInput.classList.add('text-green-500');
                        pesanHasil.innerText = 'Hasil pengujian memenuhi spesifikasi standar.';
                        pesanHasil.classList.add('italic', 'text-green-500');
                    } else {
                        hasilKalkulasiInput.classList.add('text-red-500');
                        pesanHasil.innerText = 'Hasil pengujian tidak memenuhi spesifikasi standar.';
                        pesanHasil.classList.add('italic', 'text-red-500');
                    }
                }
            } else {
                hasilKalkulasiInput.value = '';
            }
        }
        
        function updateFaktorKoreksi() {
            const suhuValueRaw = suhuInput.value;
            const suhuNumber = parseFloat(suhuValueRaw);
            faktorKoreksiInput.value = '';
            if (!isNaN(suhuNumber)) {
                const suhuKey = suhuNumber.toFixed(1);
                const konduktorValue = konduktorSelect.value;
                const currentFactors = correctionFactors[konduktorValue];
                if (currentFactors && currentFactors[suhuKey]) {
                    faktorKoreksiInput.value = currentFactors[suhuKey];
                }
            }
            hitungHasil();
        }

        function updateSpekMax() {
            const konduktorValue = konduktorSelect.value;
            const penampangValue = penampangSelect.value;
            const currentSpec = specMaxValues[konduktorValue];
            if (currentSpec && currentSpec[penampangValue]) {
                spekMaxInput.value = currentSpec[penampangValue];
            } else {
                spekMaxInput.value = '';
            }
            hitungHasil();
        }

        function hapus() {
            pembacaanAlatInput.value = '';
            panjangInput.value = '';
            suhuInput.value = '';
            updateFaktorKoreksi();
        }

        pembacaanAlatInput.addEventListener('input', hitungHasil);

        hapusBtn.addEventListener('click', hapus);

        if (themeToggler) {
            const initTheme = () => {
                const currentTheme = localStorage.getItem('theme_mypro') || 'dark';
                const icon = themeToggler.querySelector('i');
                if (currentTheme === 'dark') {
                    document.body.classList.add('dark-mode');
                    document.documentElement.classList.add('dark');
                    document.documentElement.classList.add('dark-mode');
                    if (icon) icon.className = 'bi bi-sun-fill';
                } else {
                    document.body.classList.remove('dark-mode');
                    document.documentElement.classList.remove('dark');
                    document.documentElement.classList.remove('dark-mode');
                    if (icon) icon.className = 'bi bi-moon-stars-fill';
                }
            };
            themeToggler.addEventListener('click', () => {
                const isDark = document.body.classList.toggle('dark-mode');
                document.documentElement.classList.toggle('dark', isDark);
                document.documentElement.classList.toggle('dark-mode', isDark);
                localStorage.setItem('theme_mypro', isDark ? 'dark' : 'light');
                const icon = themeToggler.querySelector('i');
                if (icon) icon.className = isDark ? 'bi bi-sun-fill' : 'bi-moon-stars-fill';
            });
            initTheme();
